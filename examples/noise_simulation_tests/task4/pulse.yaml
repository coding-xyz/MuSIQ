schema_version: "1.0"
pulse:
  defaults:
    ro_carrier_freq_Hz: 6.450e9
    schedule_policy: serial

  gates:
    measure:
      recipe_type: measure
      carrier_freq_Hz: 6.450e9
      segments:
        - shape: readout
          duration_ns: 60.0
          amplitude: 5000.0
          rise_ns: 0.0
          fall_ns: 0.0
        - shape: readout
          duration_ns: 260.0
          amplitude: 800.0
          rise_ns: 0.0
          fall_ns: 0.0

    virtual_z:
      recipe_type: virtual_z

  acquisition:
    mode: heterodyne
    integration_window_ns: 300.0
    start_delay_ns: 20.0
    demodulation:
      if_Hz: 650.0e6
      phase_rad: 0.0
    iq_discrimination:
      enabled: true
      method: linear_discriminant
      labels: ["1"]
    noise_analysis:
      enabled: true
      estimate_snr: true
      estimate_cluster_spread: true
      estimate_assignment_error: true
