schema_version: "3.0"
pulse:
  channels:
    - name: XY_q0
      kind: drive
      target: q0
      port: drive_port
  carriers:
    XY_q0:
      freq_Hz: 5.0e9
      phase_rad: 0.0
  waveforms:
    x90_drag:
      shape: drag
      duration_ns: 20.0
      sigma_ns: 4.0
      beta: 0.35
  operations:
    x:
      - channel: XY_q0
        waveform: x90_drag
        scale: 2.0
    sx:
      - channel: XY_q0
        waveform: x90_drag
        scale: 1.0
  schedule:
    policy: serial
  acquisition: {}
