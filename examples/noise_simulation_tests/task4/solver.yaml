schema_version: "3.0"
solver:
  engine: qutip
  study:
    - name: parametric_rx_state_prep
      description: parametric single-qubit state preparation with drive-amplitude calibration
      active_components: [q0]
      active_connections: []
      prep_state:
        label: rx_theta
        sequence: []
      representations:
        q0: quantum
      bases:
        q0:
          kind: nlevel
          levels: 3
      solver_mode: me
      time:
        dt_s: 2.5e-10
        t_end_s: 8.0e-8
        t_padding_s: 0.0
      frame:
        mode: rotating
        reference: carrier
        rwa: true
      options: {}
  schedule:
    policy: serial

