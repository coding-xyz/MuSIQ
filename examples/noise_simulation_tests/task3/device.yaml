schema_version: "3.0"
device:
  components:
    - id: r0
      type: resonator
      description: "Classical readout cavity with a hidden-state-dependent dispersive shift."
      ports:
        input: ro_in
        output: ro_out
      parameters:
        freq_Hz: 6.450e9
        kappa_int_Hz: 0.80e6
        kappa_ext_Hz: 4.50e6
        chi_Hz: -5.50e6

    - id: ro0
      type: readout_line
      description: "Classical feedline and amplification chain for readout."
      ports:
        input: line_in
        output: line_out
      parameters:
        center_freq_Hz: 6.450e9
        impedance_Ohm: 50.0
        eta_chain: 0.35
        gain_dB: 42.0
        added_noise_photons: 18.0
        bandwidth_Hz: 6.00e6
        input_amplitude_noise_rel_sigma: 0.06
        input_phase_noise_std_rad: 0.05
        input_additive_noise_sigma: 1.0e-2
        feedback_success_prob: 0.85

  connections:
    - id: readout_r0_ro0
      type: readout_feedline
      a: r0
      b: ro0
      parameters:
        kappa_ext_Hz: 4.50e6
        eta_chain: 0.35
        bandwidth_Hz: 6.00e6
        input_output:
          cavity_equation: "dalpha/dt = -(i*Delta_eff + kappa/2) alpha + sqrt(kappa_ext)*a_in(t)"
          output_equation: "a_out(t) = a_in(t) - sqrt(kappa_ext) * alpha(t)"

  parameters:
    simulation_level: cqed
    control_scale: 1.0

noise:
  readout_error: 0.01
