schema_version: "3.0"
target: trajectory
input:
  qasm_text: |
    OPENQASM 3;
    include "stdgates.inc";
    qubit[1] q;
    bit[1] c;
    measure q[0] -> c[0];
    reset q[0];
    measure q[0] -> c[0];
  solver_config: solver.yaml
  device_config: device.yaml
  pulse_config: pulse.yaml
  analyser_config: analyser.yaml
output:
  out_dir: ./runs
  persist_artifacts: true
  artifact_mode: targeted
  export_plots: false
  export_dxf: false
features: {}
tags: [task3, classical-reset, cavity, iq-analysis]

