schema_version: "1.0"
trajectory:
  quantum: density_matrix
  save_times: all
  save_final_state: true
  save_jump_events: false
  save_measurement_records: true
metrics:
  - population
  - mean_excited
  - variance
readout_model:
  mode: cavity_classical_readout
  channels:
    cavity_drive: RO_r0
    local_oscillator: LO_r0
  receiver:
    mode: direct_adc
    adc_sample_rate_Hz: 1.0e9
    carrier_frequency_Hz: 6.450e9
    lo_frequency_Hz: 5.800e9
    if_frequency_Hz: 650.0e6
    rf_phase_rad: 0.0
    if_phase_rad: 0.0
    digital_lo_phase_rad: 0.0
    rf_noise_sigma: 0.0
    adc_noise_sigma: 150.0
  input_output:
    cavity_equation: "dalpha/dt = -(i*Delta_eff + kappa/2) alpha + sqrt(kappa_ext)*a_in(t)"
    output_equation: "a_out(t) = a_in(t) - sqrt(kappa_ext) * alpha(t)"
    complex_envelope: "v_env(t) ~ gain * (sqrt(eta_chain) * a_out(t) + n_chain(t))"
  derived_signals:
    - intracavity_field
    - outgoing_field
    - complex_envelope
    - rf_signal
    - adc_signal
    - integrated_I
    - integrated_Q
iq_discrimination:
  enabled: true
  method: linear_discriminant
  shots: 1000
  features: [I, Q, amplitude, phase]
  outputs:
    - iq_centroids
    - confusion_matrix
    - assignment_fidelity
noise_analysis:
  enabled: true
  sources:
    - relaxation
    - dephasing
    - resonator_loss
    - amplifier_added_noise
    - state_preparation_error
  outputs:
    - snr
    - iq_cluster_separation
    - assignment_error
