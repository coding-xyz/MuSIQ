      type: transmon
      description: single transmon for pulse-shape optimization
      ports:
        drive: drive_port
      parameters:
        freq_Hz: 5.0e9
        anharmonicity_Hz: -1.5e8
      noise:
        - id: q0_T1
          kind: markovian
          operator: lowering
          parameters:
            T1_s: 20.0e-6
        - id: q0_Tphi
          kind: markovian
          operator: sigma_z_over_2
          parameters:
            Tphi_s: 5.714286e-6
  connections: []
  simulation_level: nlevel
  control_scale: 1.0
