schema_version: "3.0"
device:
  components:
    - id: q0
      type: transmon
      description: control-like transmon for two-qubit CZ simulation
      ports:
        drive: drive_q0
      parameters:
        freq_Hz: 5.00e9
        anharmonicity_Hz: -2.0e8
      noise:
        - id: q0_T1
          kind: markovian
          operator: lowering
          parameters:
            T1_s: 24.0e-6
        - id: q0_Tphi
          kind: markovian
          operator: sigma_z_over_2
          parameters:
            Tphi_s: 19.764706e-6
    - id: q1
      type: transmon
      description: target-like transmon for two-qubit CZ simulation
      ports:
        drive: drive_q1
      parameters:
        freq_Hz: 5.00e9
        anharmonicity_Hz: -2.1e8
      noise:
        - id: q1_T1
          kind: markovian
          operator: lowering
          parameters:
            T1_s: 22.0e-6
        - id: q1_Tphi
          kind: markovian
          operator: sigma_z_over_2
          parameters:
            Tphi_s: 16.5e-6
  connections:
    - id: zz_q0_q1
      type: zz
      a: q0
      b: q1
      parameters:
        max_effective_coupling_Hz: 0.0
      noise:
        residual_zz_Hz: 0.0
  simulation_level: nlevel
  control_scale: 1.0
