schema_version: "1.0"
tag: task7_crosstalk_proxy
title: "Task 7 Crosstalk Proxy"
qasm_text: |
  OPENQASM 3;
  include "stdgates.inc";
  qubit[2] q;
  bit[2] c;
  x q[0];
  delay[20ns] q[1];
  measure q -> c;
engines: [qutip, qtoolbox, qoptics]
solver_mode: me
display_metrics: [RO_0_abs_area, final_p1_obs, final_state_last]
cases:
  - tag: weak_xtalk
    device:
      couplings:
        - i: 0
          j: 1
          g_Hz: 2.0e7
          kind: xx+yy
      qubit_freqs_Hz: [5.0e9, 5.15e9]
    pulse:
      defaults:
        measure_duration_ns: 60.0
        gate_duration_ns: 20.0
    noise:
      - id: q0_ou_weak_xtalk
        kind: ou
        targets: [q0]
        operator: sigma_z_over_2
        amplitude:
          sigma_Hz: 1.0e7
          tau_s: 8.0e-9
      - id: q1_ou_weak_xtalk
        kind: ou
        targets: [q1]
        operator: sigma_z_over_2
        amplitude:
          sigma_Hz: 1.0e7
          tau_s: 8.0e-9
    note: weak crosstalk proxy
  - tag: strong_xtalk
    device:
      couplings:
        - i: 0
          j: 1
          g_Hz: 1.0e8
          kind: xx+yy
      qubit_freqs_Hz: [5.0e9, 5.05e9]
    pulse:
      defaults:
        measure_duration_ns: 120.0
        gate_duration_ns: 28.0
    noise:
      - id: q0_ou_strong_xtalk
        kind: ou
        targets: [q0]
        operator: sigma_z_over_2
        amplitude:
          sigma_Hz: 4.0e7
          tau_s: 1.2e-8
      - id: q1_ou_strong_xtalk
        kind: ou
        targets: [q1]
        operator: sigma_z_over_2
        amplitude:
          sigma_Hz: 4.0e7
          tau_s: 1.2e-8
    note: strong crosstalk proxy
