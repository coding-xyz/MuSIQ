schema_version: "1.0"
tag: task4_nonstationary_noise
title: "Task 4 Nonstationary Noise"
qasm_text: |
  OPENQASM 3;
  include "stdgates.inc";
  qubit[1] q;
  bit[1] c;
  h q[0];
  x q[0];
  measure q[0] -> c[0];
engines: [qutip, qtoolbox, qoptics]
solver_mode: me
display_metrics: [final_p1_obs, final_state_last]
cases:
  - tag: one_over_f
    device: {}
    pulse:
      defaults:
        gate_duration_ns: 22.0
    noise:
      - id: q0_1overf_case
        kind: one_over_f
        targets: [q0]
        operator: sigma_z_over_2
        amplitude:
          rms_Hz: 4.0e7
          definition: integrated_rms_over_band
        band_Hz: [1.0e6, 1.0e8]
        exponent: 1.0
        psd_convention: one_sided
    note: 1/f surrogate noise
  - tag: ou_drift
    device: {}
    pulse:
      defaults:
        gate_duration_ns: 22.0
    noise:
      - id: q0_ou_case
        kind: ou
        targets: [q0]
        operator: sigma_z_over_2
        amplitude:
          sigma_Hz: 4.0e7
          tau_s: 1.2e-8
    note: OU frequency drift surrogate
