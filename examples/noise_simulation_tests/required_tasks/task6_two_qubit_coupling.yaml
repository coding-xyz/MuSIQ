schema_version: "1.0"
tag: task6_two_qubit_coupling
title: "Task 6 Two-Qubit Coupling"
qasm_text: |
  OPENQASM 3;
  include "stdgates.inc";
  qubit[2] q;
  bit[2] c;
  h q[0];
  cx q[0], q[1];
  measure q -> c;
engines: [qutip, qtoolbox, qoptics]
solver_mode: me
display_metrics: [final_p1_obs, final_state_last]
cases:
  - tag: weak_coupling
    device:
      couplings:
        - i: 0
          j: 1
          g_Hz: 2.0e7
          kind: xx+yy
    pulse:
      gate_duration_ns: 20.0
    noise:
      - id: q0_T1_weak
        kind: markovian
        targets: [q0]
        operator: lowering
        rate:
          T1_s: 1.0e-4
      - id: q0_Tphi_weak
        kind: markovian
        targets: [q0]
        operator: sigma_z_over_2
        rate:
          Tphi_s: 133.333333e-6
      - id: q1_T1_weak
        kind: markovian
        targets: [q1]
        operator: lowering
        rate:
          T1_s: 1.0e-4
      - id: q1_Tphi_weak
        kind: markovian
        targets: [q1]
        operator: sigma_z_over_2
        rate:
          Tphi_s: 133.333333e-6
    note: weak 2Q coupling
  - tag: strong_coupling
    device:
      couplings:
        - i: 0
          j: 1
          g_Hz: 8.0e7
          kind: xx+yy
    pulse:
      gate_duration_ns: 28.0
    noise:
      - id: q0_T1_strong
        kind: markovian
        targets: [q0]
        operator: lowering
        rate:
          T1_s: 6.0e-5
      - id: q0_Tphi_strong
        kind: markovian
        targets: [q0]
        operator: sigma_z_over_2
        rate:
          Tphi_s: 72.0e-6
      - id: q1_T1_strong
        kind: markovian
        targets: [q1]
        operator: lowering
        rate:
          T1_s: 6.5e-5
      - id: q1_Tphi_strong
        kind: markovian
        targets: [q1]
        operator: sigma_z_over_2
        rate:
          Tphi_s: 81.25e-6
    note: stronger 2Q coupling
