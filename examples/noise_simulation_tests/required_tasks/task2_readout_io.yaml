schema_version: "3.0"
target: trajectory
input:
  qasm_text: |
    OPENQASM 3;
    include "stdgates.inc";
    qubit[1] q;
    bit[1] c;
    x q[0];
    measure q[0] -> c[0];
  solver_config: ../../../templates/solvers/qutip.yaml
  device_config: ../../../templates/devices/single_qubit.yaml
  pulse_config: ../../../templates/pulses/single_qubit.yaml
  analyser_config: ../../../templates/analysers/default.yaml
output:
  out_dir: ../runs/task2_readout_io
  persist_artifacts: true
  artifact_mode: targeted
  export_plots: false
  export_dxf: false
features: {}
tags: [task2, readout-io]


