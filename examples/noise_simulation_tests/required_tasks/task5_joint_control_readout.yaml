schema_version: "1.0"
tag: task5_joint_control_readout
title: "Task 5 Joint Control and Readout"
qasm_text: |
  OPENQASM 3;
  include "stdgates.inc";
  qubit[1] q;
  bit[1] c;
  h q[0];
  x q[0];
  measure q[0] -> c[0];
engines: [qutip, qtoolbox, qoptics]
solver_mode: me
display_metrics: [RO_0_abs_area, final_p1_obs, final_state_last]
cases:
  - tag: nominal_joint
    device:
      control_scale: 0.9
    pulse:
      defaults:
        measure_duration_ns: 60.0
        gate_duration_ns: 20.0
    noise:
      - id: q0_ou_nominal
        kind: ou
        targets: [q0]
        operator: sigma_z_over_2
        amplitude:
          sigma_Hz: 1.0e7
          tau_s: 6.0e-9
    note: mild control/readout disturbance
  - tag: stressed_joint
    device:
      control_scale: 1.25
    pulse:
      defaults:
        measure_duration_ns: 120.0
        gate_duration_ns: 30.0
    noise:
      - id: q0_ou_stressed
        kind: ou
        targets: [q0]
        operator: sigma_z_over_2
        amplitude:
          sigma_Hz: 5.0e7
          tau_s: 1.4e-8
    note: stronger combined control/readout disturbance
