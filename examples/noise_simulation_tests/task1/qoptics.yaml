schema_version: "3.0"
solver:
  engine: qoptics
  study:
    - name: control_dynamics
      active_components: [q0]
      active_connections: []
      representations:
        q0: quantum
      bases:
        q0:
          kind: nlevel
          levels: 3
      solver_mode: me
      time:
        dt_s: 1.0e-9
        t_end_s: 50.0e-6
        t_padding_s: 0.0
      frame:
        mode: rotating
        reference: carrier
        rwa: true
      options: {}
  schedule:
    policy: serial

