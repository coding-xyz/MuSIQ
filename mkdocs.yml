site_name: MuSIQ Documentation
site_description: Workflow, circuit IR, pulse schema, and API reference for MuSIQ.
repo_name: MuSIQ
use_directory_urls: false
docs_dir: docs/src
site_dir: docs/site

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - gen-files:
      scripts:
        - docs/src/dev/gen_ref_pages.py
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_root_toc_entry: false
            docstring_style: google

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

exclude_docs: |
  WIKI*.md
  schema.md
  schema_*.md

nav:
  - Home: index.md
  - Architecture:
      - System Overview: architecture.md
      - Data Taxonomy: taxonomy.md
      - Workflow Guide: workflow.md
  - Guides:
      - Typed Pulse Schema: wiki/pulse_schema.md
      - Schedule Circuit IR: wiki/circuit_ir.md
  - API Reference:
      - Overview: api/index.md
