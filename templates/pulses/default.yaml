schema_version: "1.0"
pulse:
  defaults:
    xy_carrier_freq_Hz: 5.0e9
    ro_carrier_freq_Hz: 6.450e9
    gate_duration_ns: 20.0
    schedule_policy: serial
  gates:
    x:
      recipe_type: x
      shape: drag
      duration_ns: 20.0
      amplitude_Hz: 12.5e6
      carrier_freq_Hz: 5.0e9
      sigma_fraction: 0.2
      drag_beta: 0.2
    sx:
      recipe_type: sx
      shape: gaussian
      duration_ns: 20.0
      amplitude_Hz: 6.25e6
      carrier_freq_Hz: 5.0e9
      sigma_fraction: 0.2
    h:
      recipe_type: h
      shape: rect
      duration_ns: 20.0
      amplitude_Hz: 6.25e6
      carrier_freq_Hz: 5.0e9
      edge_ns: 0.0
      phase_rad: 1.5707963267948966
    ry:
      recipe_type: ry
      shape: rect
      duration_ns: 20.0
      amplitude_Hz: 12.5e6
      carrier_freq_Hz: 5.0e9
      edge_ns: 0.0
      phase_rad: 1.5707963267948966
    id:
      recipe_type: id
      duration_ns: 20.0
    measure:
      recipe_type: measure
      carrier_freq_Hz: 6.450e9
      duration_ns: 200.0
      amplitude: 0.8
      shape: readout
      edge_ns: 2.0
    virtual_z:
      recipe_type: virtual_z
  acquisition:
    mode: heterodyne
    measure_start_delay_ns: 20.0
    integration_window_ns: 160.0
    start_delay_ns: 28.0
    demodulation:
      if_Hz: 650.0e6
      phase_rad: 0.0
    iq_discrimination:
      enabled: true
      method: linear_discriminant
      labels: ["0", "1"]
    noise_analysis:
      enabled: true
      estimate_snr: true
      estimate_cluster_spread: true
      estimate_assignment_error: true
