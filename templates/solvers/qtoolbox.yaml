schema_version: "3.0"
solver:
  engine: qtoolbox
  study:
    - name: control_dynamics
      description: default single-qubit control study
      active_components: [q0]
      active_connections: []
      prep_state:
        label: ground
        sequence: []
      representations:
        q0: quantum
      bases:
        q0:
          kind: nlevel
          levels: 3
      solver_mode: me
      time:
        dt_s: 1.0e-9
        t_padding_s: 20.0e-9
      frame:
        mode: rotating
        reference: carrier
        rwa: true
      options: {}
  schedule:
    policy: serial
