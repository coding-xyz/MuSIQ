schema_version: "1.0"
pulse:
  defaults:
    xy_carrier_freq_Hz: 5.0e9
    schedule_policy: parallel

  gates:
    sx:
      recipe_type: sx
      shape: gaussian
      duration_ns: 30.0
      amplitude_Hz: 8.8e6
      carrier_freq_Hz: 5.0e9
      sigma_fraction: 0.2

    cz:
      recipe_type: cz
      shape: rect
      duration_ns: 50.0
      amplitude_Hz: 10.0e6
      edge_ns: 2.0
      target_conditional_phase_rad: 0.0

    virtual_z:
      recipe_type: virtual_z

  channel_overrides:
    XY_0:
      sx:
        carrier_freq_Hz: 4.910e9

    XY_1:
      sx:
        carrier_freq_Hz: 4.930e9

    XY_2:
      sx:
        carrier_freq_Hz: 4.950e9

    XY_3:
      sx:
        carrier_freq_Hz: 4.970e9

    XY_4:
      sx:
        carrier_freq_Hz: 4.990e9

    XY_5:
      sx:
        carrier_freq_Hz: 5.010e9

    XY_6:
      sx:
        carrier_freq_Hz: 5.030e9

    XY_7:
      sx:
        carrier_freq_Hz: 5.050e9

    XY_8:
      sx:
        carrier_freq_Hz: 5.070e9

    XY_9:
      sx:
        carrier_freq_Hz: 5.090e9
