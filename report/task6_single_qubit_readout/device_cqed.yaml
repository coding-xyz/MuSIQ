schema_version: "3.0"
device:
  components:
    - id: q0
      type: transmon
      description: "Readout qubit with finite T1 so the excited state can decay during measurement."
      ports:
        drive: xy_drive
      parameters:
        freq_Hz: 5.000e9
        anharmonicity_Hz: -2.20e8
      noise:
        - id: q0_T1
          kind: markovian
          operator: lowering
          parameters:
            T1_s: 0.35e-6
        - id: q0_Tphi
          kind: markovian
          operator: sigma_z_over_2
          parameters:
            Tphi_s: 8.0e-6

    - id: r0
      type: resonator
      description: "Quantum readout cavity dispersively coupled to the qubit."
      ports:
        input: ro_in
        output: ro_out
      parameters:
        freq_Hz: 6.450e9
        kappa_int_Hz: 0.80e6

    - id: ro0
      type: readout_line
      description: "Classical feedline and amplification chain for CQED readout replay."
      ports:
        input: line_in
        output: line_out
      parameters:
        impedance_Ohm: 50.0
        eta_chain: 0.38
        gain_dB: 12.0
        bandwidth_Hz: 6.00e6
        center_freq_Hz: 6.450e9
        added_noise_photons: 18.0
        mode: direct_adc
        carrier_frequency_Hz: 6.450e9
        lo_frequency_Hz: 5.800e9
        if_frequency_Hz: 650.0e6
        rf_phase_rad: 0.0
        if_phase_rad: 0.0
        digital_lo_phase_rad: 0.0
        adc_sample_rate_Hz: 1.0e9
        rf_noise_sigma: 0.0
        adc_noise_sigma: 150.0
        input_amplitude_noise_rel_sigma: 0.18
        input_phase_noise_std_rad: 0.14
        input_additive_noise_sigma: 100.0

  connections:
    - id: dispersive_q0_r0
      type: dispersive
      a: q0
      b: r0
      parameters:
        chi_Hz: -1.20e6

    - id: readout_r0_ro0
      type: readout_feedline
      a: r0
      b: ro0
      parameters:
        kappa_ext_Hz: 4.50e6
        eta_chain: 0.80
        bandwidth_Hz: 6.00e6
        measurement_rate_Hz: 4.50e6
        input_output:
          cavity_equation: "dalpha/dt = -(i*Delta_eff + kappa/2) alpha + sqrt(kappa_ext)*a_in(t)"
          output_equation: "a_out(t) = a_in(t) - sqrt(kappa_ext) * alpha(t)"

  simulation_level: cqed
  control_scale: 1.0

noise:
  readout_error: 0.05
