schema_version: "3.0"
pulse:
  defaults:
    xy_carrier_freq_Hz: 5.0e9
    ro_carrier_freq_Hz: 6.450e9
    schedule_policy: serial
  gates:
    x:
      recipe_type: x
      shape: rect
      duration_ns: 20.0
      amplitude_Hz: 12.5e6
      carrier_freq_Hz: 5.0e9
      edge_ns: 0.0
    measure:
      recipe_type: measure
      carrier_freq_Hz: 6.450e9
      segments:
        - shape: readout
          duration_ns: 40.0
          amplitude: 0.0625
          rise_ns: 10.0
          fall_ns: 0.0
        - shape: readout
          duration_ns: 180.0
          amplitude: 0.01875
          rise_ns: 0.0
          fall_ns: 10.0
    virtual_z:
      recipe_type: virtual_z
  acquisition:
    mode: heterodyne
    measure_start_delay_ns: 20.0
    integration_window_ns: 160.0
    start_delay_ns: 28.0
    demodulation:
      if_Hz: 650.0e6
      phase_rad: 0.0
    iq_discrimination:
      enabled: true
      method: linear_discriminant
      labels: ["1"]
    noise_analysis:
      enabled: true
      estimate_snr: true
      estimate_cluster_spread: true
      estimate_assignment_error: true
