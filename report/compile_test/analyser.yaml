schema_version: "1.0"
trajectory:
  quantum: density_matrix
  save_times: all
  save_final_state: true
  save_jump_events: false
  save_measurement_records: false
analysis:
  - name: state_analysis
    level: CASE
    metrics:
      - population
      - leakage
      - coherence_01
  - name: rabi_sweep_analysis
    level: PARAMETRIC
    metrics:
      - final_P0
      - final_P1
      - final_P2
      - final_fidelity
      - final_leakage
      - final_coherence_01
