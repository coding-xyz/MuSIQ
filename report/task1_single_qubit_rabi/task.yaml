schema_version: "3.0"
target: trajectory
input:
  qasm_text: |
    OPENQASM 3;
    include "stdgates.inc";
    qubit[1] q;
    rx(theta) q[0];
  solver_config: solver.yaml
  device_config: device.yaml
  pulse_config: pulse.yaml
  analyser_config: analyser.yaml
  param_bindings:
    theta: 3.141592653589793
output:
  out_dir: runs/task1_single_qubit_rabi
  persist_artifacts: true
  artifact_mode: targeted
  export_plots: false
  export_dxf: false
features: {}
tags: [report, task1, single-qubit, rabi, rx, state-preparation]
