schema_version: "3.0"
target: trajectory
input:
  qasm_text: |
    OPENQASM 3;
    qubit[1] q;
    bit[1] c;
    rx(1.5707963267948966) q[0];
    rz(phi) q[0];
    rx(1.5707963267948966) q[0];
    measure q[0] -> c[0];
  param_bindings:
    phi: 0.0
  solver_config: solver.yaml
  device_config: ../device.yaml
  pulse_config: pulse.yaml
  analyser_config: analyser.yaml
output:
  out_dir: ../runs/ramsey_sme
  persist_artifacts: true
  artifact_mode: all
  export_plots: false
  export_dxf: false
features: {}
tags: [autocalib, ramsey, sme, iq]
