schema_version: "3.0"
target: trajectory
input:
  qasm_text: |
    OPENQASM 3;
    qubit[1] q;
    bit[1] c;
    rx(theta) q[0];
    measure q[0] -> c[0];
  param_bindings:
    theta: 3.141592653589793
  solver_config: solver.yaml
  device_config: ../device.yaml
  pulse_config: pulse.yaml
  analyser_config: analyser.yaml
output:
  out_dir: ../runs/rabi_sme
  persist_artifacts: true
  artifact_mode: all
  export_plots: false
  export_dxf: false
features: {}
tags: [autocalib, rabi, sme, iq]
